# Test fixtures — not the source registry.
#
# Doc-narrowed under ADR 0015 (Session 37). Before Session 37 this
# file was the LLM's awareness of "what data sources exist that
# situation_room could read from." That role is gone: the classifier
# now consults a memory derived from the recipes ⨝ recipe_fetch_attempts
# ⨝ research_plans join (see `Store::sources_memory` in
# `crates/storage/src/sources_memory.rs`). The LLM emits source
# nominations directly, each carrying its own `endpoint_url` and
# `priority_tier` (see `DocumentSourceNomination` in
# `crates/pipeline/src/research.rs`). There is no static registry to
# nominate against; there is no mapping from a `source_id` to an
# `endpoint_hint`.
#
# What survives: two demo entries (`csv_demo`, `json_demo`) that the
# fetch executor's `#[ignore]` live tests author hand-crafted recipes
# against. Both URLs are stable public-domain fixtures used by the
# Phase-6 round-trip tests in `crates/pipeline/src/fetch_executor.rs`.
# Removing them would silently break those live tests.
#
# What does *not* survive: every entry that previously described a
# real source (USGS, SEC EDGAR, EUR-Lex, OFAC SDN, World Bank, IMF,
# Eurostat, OECD, FAOSTAT, KSH Hungary, EU CAP, LME, UN Comtrade,
# GDELT, RSS feeds). They were retired with ADR 0015. Their
# source-specific guidance (PDF-vs-HTML strategy, JS-rendering caveat,
# rate-limit notes, paywall caveats) was already absorbed into
# `config/prompts/recipe_author.md` v1.10–v1.12 as principles, not
# routing rules.
#
# When you want to add a new "real" source: don't edit this file.
# Classify a topic that maps to it, accept the plan, and let the
# operator's first successful fetch enter the sources memory. The
# second classification on a related topic will see it as context.
# That is the audit chain ADR 0015 ratifies.

# ---- Test fixtures (Phase 6 live `#[ignore]` round-trip tests) ----------

[[source]]
id = "csv_demo"
display_name = "CSV Demo"
description = """
A small public CSV file exposing a single numeric measurement by
named row. Used by situation_room's Phase-6 fetch executor as a
deterministic demo source: the recipe author picks a column and a
row filter, the runtime fetches the CSV, applies the recipe, and
produces one observation. Not appropriate as an authoritative
source for substantive topics — its role is to keep the fetch path
honest end-to-end.
"""
authoritative_for = []
# Stable public-domain CSV used by the live `#[ignore]` test in the
# pipeline crate. Two columns: `Name`, `Code`. The LLM authors a
# recipe targeting one of those columns with a row filter on the
# other.
endpoint_hint = "https://raw.githubusercontent.com/datasets/country-list/main/data.csv"

[[source]]
id = "json_demo"
display_name = "JSON Demo"
description = """
A small public JSON document exposing a scalar value at a known
path. Used by situation_room's Phase-6 fetch executor as a deterministic
demo source for the JSON-path extraction mode (Session 9): the
recipe author picks a JSONPath expression, the runtime fetches the
document, applies the recipe, and produces one observation. Not
appropriate as an authoritative source for substantive topics — its
role is to keep the JSON fetch path honest end-to-end alongside the
CSV demo.
"""
authoritative_for = []
# Stable public-domain JSON used by the live `#[ignore]` test. The
# top-level shape is an array of `{Name, Code}` objects; the LLM
# authors a JSONPath recipe targeting one of those scalar fields.
endpoint_hint = "https://raw.githubusercontent.com/datasets/country-list/main/data.json"
