# Source descriptors for the Level-1 classifier.
#
# This file is the LLM's awareness of "what data sources exist that
# situation_room could read from." It is NOT a runtime registry, NOT a
# fetch configuration, and there are NO Rust adapters tied to these
# entries. Each entry is a description situation_room shows the LLM at
# classification time so the plan's `document_sources` hints can
# reference real ids and have meaningful priority ordering.
#
# When Level-2 recipe authoring lands as a separate session, it will
# consume the same file (or a successor) to know what id-to-fetch
# mappings exist. Until then this file is purely classifier-side
# context.
#
# Editing this file does not require any Rust changes. The situation
# room binary loads it at startup; if the file is missing, the LLM
# is told "no sources are currently known" and nominates by
# description only.
#
# Schema:
#   [[source]]
#   id                    = "stable_snake_case_id"
#   display_name          = "Human-readable name"
#   description           = "One-paragraph description"
#   authoritative_for     = ["topic_or_metric_label", ...]   # optional
#   endpoint_hint         = "https://example.com/api/..."     # optional
#
# `endpoint_hint` is consumed by the **fetch executor's** Level-2
# authoring step (Session 10, Option F). It is a stable URL the
# executor pre-fetches so the LLM sees a real excerpt of the source's
# current shape before authoring a recipe. Without it the executor
# falls back to a synthetic placeholder URL — which the Session 9
# production run revealed the LLM tends to echo back into the
# recipe, producing `example.invalid` fetches that fail at runtime.
#
# Session 23's verification run produced empirical evidence that
# `endpoint_hint` coverage is *the* highest-leverage configuration
# concern: a source without a hint gets a stub-authored recipe (ADR
# 0014 chip), which the operator must triage manually. A source with
# a hint — even one whose precise field structure has shifted —
# anchors the LLM in real bytes and produces a fetched-bytes recipe.
#
# Set `endpoint_hint` for every source where a stable, public URL
# exists. When no such URL is reachable (e.g. a paywalled subscription
# data source whose public face is a marketing page), document the
# omission in the description so the next operator and the next prompt
# revision know it is deliberate, not forgotten.
#
# Keep entries ordered roughly by priority tier (authoritative
# primary first). The LLM reads them in order.

# ---- Authoritative primary -----------------------------------------------

[[source]]
id = "usgs_mcs"
display_name = "USGS Mineral Commodity Summaries"
description = """
Annual U.S. Geological Survey reports on production, reserves, trade,
and consumption of mineral commodities (lithium, copper, cobalt, rare
earths, etc.). Public domain, no API key. Authoritative for U.S.
mineral production figures and the global rankings published in each
chapter.
"""
authoritative_for = ["mineral_production", "mineral_reserves"]
# USGS National Minerals Information Center MCS landing page. Stable
# for years; lists every annual edition with per-commodity chapter
# links. The LLM uses this excerpt to learn the publication's chapter
# layout (each commodity gets a two-page PDF synopsis with a "World
# Mine Production" table) and authors a recipe targeting either the
# yearly index page or a specific commodity chapter PDF.
#
# PDF table extraction itself is deferred (ADR 0007 §"PdfTable
# deferral") — the recipe author may pick `static_payload` for the
# observation when the chapter has only a handful of values, or the
# author may produce a `pdf_table` recipe and surface the
# `NotImplemented` outcome at fetch time so the operator sees the
# gap. Either is honest; the chip mechanic from ADR 0014 keeps both
# legible.
endpoint_hint = "https://www.usgs.gov/centers/national-minerals-information-center/mineral-commodity-summaries"

[[source]]
id = "sec_edgar"
display_name = "SEC EDGAR"
description = """
The U.S. Securities and Exchange Commission's filing system. Contains
10-K annual reports, 10-Q quarterly reports, 8-K material event
filings, and proxy statements for every U.S.-listed public company.
Authoritative for company-stated financials, risk factors, executive
compensation, and material events.
"""
authoritative_for = ["corporate_filings", "company_financials"]
# EDGAR Full-Text Search (EFTS) endpoint. The path is the public
# search-index, which returns JSON listing every filing matching a
# keyword query plus optional date and form-type filters. Stable
# since EDGAR's full-text search rolled out and documented at
# https://www.sec.gov/edgar/search-and-access. No API key, but the
# SEC requires a descriptive `User-Agent` header (already enforced
# by SecureHttpClient via `SecureHttpConfig::user_agent`).
#
# The LLM authors a recipe that selects a filing list (each entry
# carries `cik`, `accession_no`, `form`, `file_date`, `display_name`)
# and either extracts metadata directly (`json_path`) or follows the
# accession URL to an individual filing for `static_payload`-style
# capture.
endpoint_hint = "https://efts.sec.gov/LATEST/search-index?q=&forms=10-K&dateRange=custom&startdt=2024-01-01&enddt=2024-12-31"

[[source]]
id = "eur_lex"
display_name = "EUR-Lex"
description = """
The European Union's legal database — directives, regulations,
decisions, and treaties. Authoritative for the text of EU law and
the official journal entries that bring acts into force.

EXTRACTION GUIDANCE (Session 24 patch B): prefer HTML over PDF
for this source. EUR-Lex publishes each act both as an HTML
metadata page (stable CELEX numbers, dates, document types,
ELI/PE codes in CSS-targetable result lists) and as PDF
translations in every EU official language (24 languages —
English, French, German, …, Maltese). The HTML surface is the
right target for "what acts exist about X" queries via
`css_select`. The PDF surface is content-rich but format-
fragile: layout varies by act, columns and footnotes shift
between language editions, and *picking one of 24 translations
is itself a decision the recipe author cannot make on the
user's behalf*. Reserve PDF recipes for cases where the user
explicitly wants an act's full text in a known language; do
**not** use `pdf_table` here at all (the language-selection
problem makes any single translation arbitrary, and `pdf_table`
extraction is itself deferred per ADR 0007's 2026-04-22 review
note pending its own focused implementation session). When PDF
content extraction is genuinely required, `static_payload` is
the architecturally sanctioned alternative.
"""
authoritative_for = ["eu_legislation"]
# EUR-Lex search index page. HTML; the LLM should pick a
# `css_select` recipe targeting the result-list rows. Stable URL
# pattern but the underlying HTML structure is reshuffled
# occasionally — re-authoring is expected when it shifts.
endpoint_hint = "https://eur-lex.europa.eu/search.html?scope=EURLEX&type=quick&lang=en"

[[source]]
id = "ofac_sdn"
display_name = "OFAC Specially Designated Nationals List"
description = """
The U.S. Treasury's sanctions list, updated continuously. Names
individuals, companies, vessels, and aircraft subject to U.S.
sanctions. Authoritative for U.S. sanction designations.
"""
authoritative_for = ["us_sanctions"]
# Canonical CSV of the SDN list. Stable URL pattern since the
# 2020 HTTPS migration (see Treasury technical announcement of
# Aug 2020). Comma-delimited; primary file is `sdn.csv` with a main
# table of entries; companion files `add.csv` (addresses) and
# `alt.csv` (alternate names) link via `ent_num`. The LLM picks a
# `csv_cell` recipe targeting `sdn.csv` for the primary listing,
# usually filtered by program code (e.g. `RUSSIA-EO14024`,
# `IRAN-EO13871`) which appears in the third column.
endpoint_hint = "https://www.treasury.gov/ofac/downloads/sdn.csv"

[[source]]
id = "world_bank_indicators"
display_name = "World Bank Open Data Indicators"
description = """
Country-level macroeconomic and development indicators (GDP, trade,
demographics, governance) sourced from national statistical offices
and standardized by the World Bank. Long historical series.
"""
authoritative_for = ["country_macro_indicators"]
# Real country-indicator JSON response, not the indicator catalog.
#
# Session 32 (P1, audit followup to Session 31's screenshot): the
# previous hint pointed at `https://api.worldbank.org/v2/indicator?...`
# which returns the *catalog* of indicator definitions (a list of
# `{id, name, unit, source, ...}` rows describing what indicators
# exist). The recipe author saw the catalog shape and authored
# `json_path` recipes assuming the data response had the same shape;
# at runtime the catalog endpoint of course never carries
# country/year/value data, so apply blew up with the
# `1.0.HCount.1.90usd` mismatch from the Session 30 screenshot.
#
# This URL returns the actual data shape: a two-element JSON array
# `[paginationmeta, [datapoints]]` where each datapoint carries
# `country.value`, `indicator.value`, `value`, `date`. The LLM now
# learns the real envelope and authors recipes whose extraction
# paths land on real values. The country code (`all`) and indicator
# (`NY.GDP.MKTP.CD` — GDP in current US$) are illustrative; the LLM
# substitutes per-plan values into the URL pattern when authoring.
# `per_page=5` keeps the excerpt small enough to fit the
# `PREFETCH_EXCERPT_BUDGET` while still showing multiple datapoints.
endpoint_hint = "https://api.worldbank.org/v2/country/all/indicator/NY.GDP.MKTP.CD?format=json&per_page=5"

[[source]]
id = "imf_weo"
display_name = "IMF World Economic Outlook"
description = """
Twice-yearly IMF projections of country and regional macroeconomic
indicators (GDP, inflation, current account, fiscal balance). Carries
both historical series and forward-looking forecasts.
"""
authoritative_for = ["country_macro_forecasts"]
# IMF Data Portal landing page for the WEO dataset. The actual
# WEO database releases ship as zipped Tab-Delimited bundles via
# the per-vintage download endpoint (e.g.
# /external/Pubs/ft/weo/2025/01/weodata/WEOApr2025all.ashx) which
# the LLM will frequently want to use as the recipe's fetch URL,
# but those URLs change every six months. The data-portal landing
# page is stable, links each vintage, and gives the LLM enough of
# the schema (indicator codes like `NGDP_RPCH`, country tables,
# subject-group taxonomy) to author a `csv_cell` recipe pointing
# at the vintage-specific URL the operator can refresh as the
# next release lands.
endpoint_hint = "https://data.imf.org/en/datasets/IMF.RES:WEO"

[[source]]
id = "eurostat"
display_name = "Eurostat"
description = """
The European Union's official statistical office. Comprehensive
country-level statistics for all EU member states (and EFTA where
agreements apply) covering economy, population, agriculture, energy,
transport, environment, regional indicators, and labour market.
Authoritative for EU member-state statistics where a national
statistics office's data has been harmonized to EU methodology.

Data shape: most datasets are exposed as JSON-stat (a nested
envelope with `dimension`, `value`, `id`, `size` keys; values are a
flat array indexed by the cartesian product of dimensions). The
recipe author should expect to parse JSON-stat envelope structure
rather than a flat array of records — this is unlike the World
Bank shape. The bulk-download CSV alternative is also available
per dataset for recipes that prefer csv_cell over json_path.
"""
authoritative_for = [
    "eu_member_state_statistics",
    "eu_agriculture",
    "eu_economy",
    "eu_energy",
    "eu_environment",
]
# Cereals production (including rice, excluding seed) by EU member
# state, in EU-standard humidity. Stable Eurostat dataset code
# `tag00115` exposed via the dissemination API. Returns JSON-stat
# envelope. Small response (a handful of dimensions, 27+ countries,
# annual frequency) — fits the prefetch excerpt budget. The LLM
# learns the JSON-stat shape from this excerpt and authors recipes
# for adjacent agricultural and economic datasets by substituting
# the dataset code in the URL path.
#
# Dataset codes follow Eurostat's dissemination naming
# (`tag00115`, `nama_10_gdp`, `demo_pjan`, etc.) and are documented
# in the data-browser UI at
# https://ec.europa.eu/eurostat/databrowser/. The LLM substitutes
# the per-plan dataset code into the URL path; URL discipline rules
# (Session 34, v1.10) cover the substitution semantics.
endpoint_hint = "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/tag00115?format=JSON"

[[source]]
id = "oecd"
display_name = "OECD Statistics"
description = """
The Organisation for Economic Co-operation and Development's
statistical database. Cross-country comparable indicators across
OECD member states (38 countries) plus selected non-member
economies, covering national accounts, employment, education,
health, environment, public finance, and trade in services.
Authoritative for cross-OECD comparison studies where consistent
methodology across countries matters more than the depth of any
single country's domestic data.

Data shape: SDMX-JSON envelope (a structured response with
`dataSets`, `structure`, `dimensions`, `attributes` — values are
nested in `dataSets[0].observations` keyed by dimension index
strings like "0:0:0:0"). Less ergonomic than World Bank's flat
shape but documented and stable. The recipe author should expect
to traverse the dimension structure rather than indexing
positionally.
"""
authoritative_for = [
    "oecd_cross_country_indicators",
    "national_accounts",
    "labour_market",
    "public_finance",
]
# OECD Quarterly National Accounts (QNA) — quarterly GDP and
# components for OECD member states. Stable dataset; the URL
# pattern is documented in the OECD's SDMX-JSON API guide
# (https://data.oecd.org/api/sdmx-json-documentation/). The
# example request below pulls one country (Germany), one measure
# (GDP at current prices), one quarter — small enough for the
# prefetch budget while showing the SDMX-JSON envelope shape.
#
# When the recipe author substitutes per-plan parameters, the
# pattern is `/data/{DATASET}/{COUNTRY}.{MEASURE}.{ADJUSTMENT}.{FREQ}/all`
# — a positional dotted-path filter, distinct from World Bank's
# query-parameter style.
endpoint_hint = "https://stats.oecd.org/SDMX-JSON/data/QNA/DEU.B1_GE.CUR.Q/all?startTime=2024-Q1&endTime=2024-Q1"

[[source]]
id = "faostat"
display_name = "FAOSTAT"
description = """
The Food and Agriculture Organization of the United Nations'
statistical database. Global coverage (245 countries and
territories) of agricultural production, trade, food security,
land use, livestock, fisheries, forestry, prices, and inputs
(fertilizer, pesticides). Time series from 1961 forward for most
domains.

Authoritative for cross-country agricultural production and trade
statistics. Where a country's national stats office reports the
same metric directly (e.g. KSH for Hungary), the national source
is more current; FAOSTAT is the right choice for cross-country
comparison or for countries without a strong national statistics
infrastructure.

Data shape: REST API at faostatservices.fao.org returns JSON with
a top-level `data` array of records. Each record carries
`Area Code`, `Item Code`, `Element Code`, `Year`, `Value`, `Unit`.
Filterable by area, item, element, and year query parameters. The
LLM should treat the catalog of `Item Code` values (barley=44,
wheat=15, etc.) as plan-substitutable; the catalog itself is
discoverable at /api/v1/{lang}/codes/items/{domain}.
"""
authoritative_for = [
    "global_agriculture",
    "crop_production",
    "livestock",
    "food_security",
    "fisheries",
]
# FAOSTAT REST API — production, crops and livestock products
# domain (`QCL`). Example request: barley (item 44), Hungary
# (area 97), one recent year. Returns a small JSON response
# showing the per-record shape the recipe author needs. The URL
# pattern is `/api/v1/{lang}/data/{DOMAIN}?area={n}&item={n}&year={yyyy}`;
# domain code substitution covers the major agricultural metrics
# (QCL = production, TCL = trade, FBS = food balance sheets).
endpoint_hint = "https://faostatservices.fao.org/api/v1/en/data/QCL?area_codes=97&item_codes=44&year=2022"

[[source]]
id = "ksh_hungary"
display_name = "KSH (Hungarian Central Statistical Office)"
description = """
Magyarország központi statisztikai hivatala — Hungary's national
statistical office. Authoritative primary source for Hungarian
domestic statistics: population, economy, employment,
agriculture, energy, environment, prices, and regional data.
Where a topic is Hungary-focused, KSH is the most current and
methodologically rigorous source for Hungarian-side numbers,
typically more current than Eurostat's harmonized data (which
re-publishes KSH submissions on a lag).

Public face: the STADAT data tables collection
(https://www.ksh.hu/stadat_eng for English, /stadat for
Hungarian). STADAT exposes thousands of small data tables
organized by topic (agriculture, demography, economy, etc.) as
HTML tables with stable identifiers; each table has a dedicated
URL and a downloadable XLSX/CSV alternative. KSH also runs a
separate STATINFO portal (https://statinfo.ksh.hu/) for
deeper cube-style queries with per-dataset URL patterns.

Data shape: STADAT individual tables are HTML — the recipe
author picks `css_select` against the table cell coordinates,
or follows the table's CSV/XLSX download link for `csv_cell`.
Some tables are pivoted (years across columns rather than
rows); the recipe author handles this via the row-filter
discipline already covered in the recipe author prompt.
"""
authoritative_for = [
    "hungarian_statistics",
    "hungarian_agriculture",
    "hungarian_economy",
    "hungarian_demographics",
]
# STADAT English-language directory — a stable HTML index of all
# published statistical tables grouped by theme. The LLM reads
# the table-of-contents shape and either authors a `css_select`
# recipe targeting one of the indexed tables or follows the
# table's per-table URL. STADAT URLs follow the pattern
# /stadat_eng/{theme}/{subtheme}/{table_id}.html — stable across
# years; older tables move to an archive section but new
# vintages keep their canonical id.
endpoint_hint = "https://www.ksh.hu/stadat_eng"

[[source]]
id = "eu_cap"
display_name = "EU Common Agricultural Policy — DG AGRI dashboards"
description = """
The European Commission's Directorate-General for Agriculture
and Rural Development (DG AGRI) publishes regular market
observatories, dashboards, and the agri-food data portal
(agridata.ec.europa.eu) covering EU agricultural markets:
cereals, oilseeds, rice, sugar, dairy, beef, pigmeat,
sheep & goat, poultry, eggs, fruit & vegetables, olive oil,
wine. Authoritative for EU-level agricultural market
intelligence and CAP (Common Agricultural Policy) monitoring.

Caveat — many DG AGRI dashboards are JavaScript-rendered single-
page apps with the underlying data feeds reachable but not
discoverable from the dashboard URL alone. Where this is the
case, the recipe author may need to author against the underlying
data feed (often a JSON or CSV download accessible via the
dashboard's "export" or "download data" link) rather than the
dashboard page itself. ADR 0014's chip mechanic surfaces stub-
authored recipes when the pre-fetch lands on an empty
JS-rendered page.

Authoritative for: EU market prices and balances; CAP support
flows by member state; common market organization (CMO)
statistics. Less authoritative for member-state-internal
statistics (those belong to Eurostat or the national stats
office).
"""
authoritative_for = [
    "eu_agricultural_markets",
    "cap_payments",
    "eu_market_observatory",
]
# Agri-food data portal landing page — directory of every
# DG AGRI dashboard and dataset. HTML; the LLM uses this as a
# discovery surface to pick the right per-topic dashboard URL
# (cereals, dairy, etc.) and then authors against either the
# dashboard's underlying data feed or the static
# documentation/PDF where the dashboard is JS-rendered.
#
# The cereals-specific dashboard is at
# https://agridata.ec.europa.eu/extensions/DashboardCereals/CerealsProduction.html
# but JS-rendered; the underlying CSV is reachable via the
# dashboard's export link. The LLM should expect to hunt for
# the export endpoint per "Hunt the URL end-to-end" discipline
# (recipe author prompt, Session 21 v1.6).
endpoint_hint = "https://agridata.ec.europa.eu/extensions/DataPortal/home.html"

