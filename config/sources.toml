[[source]]
id = "lme"
display_name = "London Metal Exchange"
description = """
Spot, three-month, and warehouse stock data for industrial metals
(aluminium, copper, zinc, lead, nickel, tin). The reference exchange
for non-ferrous metals pricing.

NOTE on `endpoint_hint` (Session 24 audit): LME's primary data
products (the Official Settlement Prices, the LMEselect tick stream,
and the warehouse stock report) are commercial subscription products
behind a paywall and do not have a stable public URL the LLM can
pre-fetch. The public-facing site (lme.com) is mostly a marketing
surface whose HTML structure is fluid and whose data tables are
session-protected. Until either (a) LME re-opens a public daily
summary or (b) the operator wires a vendor relay (Refinitiv,
Bloomberg, FastMarkets feed) into config/sources.toml as a
distinct entry, this source intentionally has no `endpoint_hint`
and recipes against it will be stub-authored. ADR 0014's chip will
surface the provenance honestly.
"""
authoritative_for = ["industrial_metals_prices", "industrial_metals_stocks"]

[[source]]
id = "comtrade"
display_name = "UN Comtrade"
description = """
The United Nations international trade statistics database. Bilateral
trade flows by HS code, country, and year. Reported by importers and
exporters; figures often disagree between the two reporting sides.
"""
authoritative_for = ["bilateral_trade_flows"]
# UN Comtrade Plus public landing page for trade-flow query. The
# data API itself (`comtradeapi.un.org/data/v1/...`) requires a
# free `Ocp-Apim-Subscription-Key` header which situation_room does
# not currently provision; without that key the data endpoints
# return 401, which the executor surfaces as a pre-fetch failure
# (and ADR 0014 stamps `StubExcerpt`). The landing page on
# comtradeplus.un.org is stable and exposes the query parameters
# (typeCode, freqCode, classification, period, reporterCode,
# partnerCode, cmdCode, flowCode), giving the LLM enough structure
# to author a recipe whose `endpoint_url` points at the per-call
# data API once a subscription key is in scope.
#
# Followup on the operator side: when a UN Comtrade subscription
# key gets wired into the secrets surface, swap this hint for a
# small data-API call so the recipe author sees real JSON shape
# instead of marketing-page HTML.
endpoint_hint = "https://comtradeplus.un.org/TradeFlow"

# ---- Industry / trade press --------------------------------------------

[[source]]
id = "gdelt"
display_name = "GDELT Project"
description = """
The Global Database of Events, Language, and Tone. Machine-coded
events extracted from broadcast, print, and web news worldwide,
updated every fifteen minutes. Useful for event detection, less so
for ground-truth claims.
"""
authoritative_for = []
# GDELT 2.0 DOC API documentation page. Returns HTML describing the
# query parameters; the LLM reads the doc shape and constructs a
# JSON-mode query URL for the recipe (DOC API supports `format=json`
# query parameter and `query=` for keyword filtering).
#
# KNOWN: this endpoint rate-limits with HTTP 429 from individual
# IPs that have made several DOC API calls recently (Session 23
# verification observed this). When the pre-fetch is rate-limited,
# ADR 0014 stamps `StubExcerpt` on the resulting recipe and the
# chip surfaces it for human review. This is not a defect of either
# the hint or the executor; GDELT's rate limit is part of the
# source's contract.
endpoint_hint = "https://api.gdeltproject.org/api/v2/doc/doc?query=domain:reuters.com&mode=ArtList&format=json&maxrecords=10"

# ---- General news (lowest authority) ------------------------------------

[[source]]
id = "rss_feeds"
display_name = "RSS Feeds (configured per session)"
description = """
Generic RSS/Atom feed reader for monitoring named publications. Use
for outlets where the publication itself is the only reasonable
source for the topic (specialist trade press, regulator press
rooms, etc.). Specific feed URLs are configured per session — a
recipe targeting this source nominates a publisher-specific feed
URL inside the recipe body, not in this descriptor.

This entry is a *category* descriptor, not a specific source. The
Session 23 verification surfaced its limitation: when the LLM
nominates `rss_feeds` for a topic, it must invent the publisher's
feed URL itself, and the inventions tend to be plausible-but-wrong
(`https://www.yna.co.kr/rss` for Yonhap, which 400'd at fetch
time). The `endpoint_hint` below points at a representative,
long-stable RSS XML document so the recipe author has *something*
real to pattern-match against — at the cost of teaching the LLM
to prefer this specific publisher when no other anchor is given.
That tradeoff is acceptable for now; the longer-term fix is to
split this entry into specific publisher entries (e.g. `bbc_rss`,
`reuters_rss`, `yna_rss`) once a session has empirical evidence
about which publishers actually carry the operator's recurring
topics.
"""
authoritative_for = []
# BBC News top-stories Atom feed. Stable since the early 2010s
# under feeds.bbci.co.uk; valid Atom 1.0; small enough that the
# pre-fetch's body-size guard won't trip. Used here as a structure
# anchor — the LLM reads the channel/item shape (title, link,
# description, pubDate, guid) and authors a `css_select` or
# `json_path` recipe (after the executor parses XML to JSON) whose
# `endpoint_url` is the *target* publisher's actual feed.
endpoint_hint = "http://feeds.bbci.co.uk/news/rss.xml"

# ---- Demo / smoke-test source (Session 8) ------------------------------
#
# A trivial CSV-shaped source the fetch executor can author against
# in development without needing access to a real API. The id is
# stable so the live `#[ignore]` test in the pipeline crate can
# refer to it deterministically; the description nudges the
# Level-2 author toward a single observation/value extraction.
#
# Not authoritative for any topic — the classifier should rarely
# nominate this source on its own merits, but a topic that happens
# to be a good fit (a small numeric quantity by country, year, or
# similar) will produce a legible recipe against it.

[[source]]
id = "csv_demo"
display_name = "CSV Demo"
description = """
A small public CSV file exposing a single numeric measurement by
named row. Used by situation_room's Phase-6 fetch executor as a
deterministic demo source: the recipe author picks a column and a
row filter, the runtime fetches the CSV, applies the recipe, and
produces one observation. Not appropriate as an authoritative
source for substantive topics — its role is to keep the fetch path
honest end-to-end.
"""
authoritative_for = []
# Stable public-domain CSV used by the live `#[ignore]` test in the
# pipeline crate. Two columns: `Name`, `Code`. The LLM authors a
# recipe targeting one of those columns with a row filter on the
# other.
endpoint_hint = "https://raw.githubusercontent.com/datasets/country-list/main/data.csv"

[[source]]
id = "json_demo"
display_name = "JSON Demo"
description = """
A small public JSON document exposing a scalar value at a known
path. Used by situation_room's Phase-6 fetch executor as a deterministic
demo source for the JSON-path extraction mode (Session 9): the
recipe author picks a JSONPath expression, the runtime fetches the
document, applies the recipe, and produces one observation. Not
appropriate as an authoritative source for substantive topics — its
role is to keep the JSON fetch path honest end-to-end alongside the
CSV demo.
"""
authoritative_for = []
# Stable public-domain JSON used by the live `#[ignore]` test. The
# top-level shape is an array of `{Name, Code}` objects; the LLM
# authors a JSONPath recipe targeting one of those scalar fields.
endpoint_hint = "https://raw.githubusercontent.com/datasets/country-list/main/data.json"
