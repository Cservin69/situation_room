# Sources designated authoritative for specific (commodity, metric) pairs.
# When an Assertion's claimant matches an authoritative source, the
# promotion pipeline elevates it directly to an Observation/Event without
# requiring multi-source consensus.

[[authority]]
source_id = "usgs_mcs"
metric = "production"
# No commodity = applies to all commodities USGS reports on

[[authority]]
source_id = "usgs_mcs"
metric = "reserves"

[[authority]]
source_id = "lme_warehouse"
metric = "warehouse_stock"
commodity = "Cu"
