# cargo-deny configuration
# Run with: cargo install cargo-deny && cargo deny check

[graph]
targets = [
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
# Fail CI on any advisory — ignore list must be reviewed and justified in PR.
yanked = "deny"
ignore = []

[licenses]
# Permissive + copyleft we've accepted. Anything else fails CI.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "AGPL-3.0",        # our own license
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Crates we explicitly don't want
deny = [
    # OpenSSL — we use rustls everywhere
    { name = "openssl", reason = "use rustls via reqwest's rustls-tls feature" },
    { name = "openssl-sys", reason = "use rustls" },
    { name = "native-tls", reason = "use rustls" },
    # Deprecated / known-bad
    { name = "atty", reason = "unsound; use is-terminal or std::io::IsTerminal" },
    { name = "failure", reason = "unmaintained; use thiserror + anyhow" },
    { name = "time", version = "<0.3", reason = "CVE-2020-26235 in 0.1/0.2" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
