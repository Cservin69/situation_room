[package]
name = "stockpile-demo"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Console demo — end-to-end fetch → parse → store → query against one USGS commodity."

[[bin]]
name = "stockpile-demo"
path = "src/main.rs"

[[bin]]
name = "stockpile-e2e"
path = "src/bin/e2e_demo.rs"

[dependencies]
