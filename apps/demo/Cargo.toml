stockpile-secure = { workspace = true }
stockpile-sources = { workspace = true }
stockpile-storage = { workspace = true }
stockpile-pipeline = { workspace = true }
stockpile-llm = { workspace = true }

tokio = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
chrono = { workspace = true }
serde_json = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }
dotenvy = { workspace = true }
